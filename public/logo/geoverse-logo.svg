<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" fill="none">
  <!-- Mark -->
  <circle cx="28" cy="28" r="26" fill="url(#earthGrad)"/>
  <defs>
    <linearGradient id="earthGrad" x1="0" y1="0" x2="28" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="50%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="steamGrad" x1="0" y1="56" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fef3c7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfccb"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <!-- Terrain/contour lines -->
  <path d="M8 32 Q18 24 28 28 Q38 32 48 26" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" fill="none"/>
  <path d="M6 38 Q18 30 28 34 Q38 38 50 32" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" fill="none"/>
  <!-- Geothermal steam -->
  <path d="M22 48 Q26 42 24 36 Q22 30 26 24" stroke="url(#steamGrad)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M30 48 Q34 42 32 36 Q30 30 34 24" stroke="url(#steamGrad)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- Spark/leaf accent -->
  <path d="M40 22 L44 18 L48 22 L44 20 Z" fill="#fcd34d" opacity="0.9"/>
  <circle cx="44" cy="16" r="2" fill="#fde68a" opacity="0.6"/>
  <!-- Ground layer -->
  <path d="M2 44 Q14 40 28 42 Q42 44 54 40" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="62" y="33" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-weight="800" font-size="22" fill="#064e3b" letter-spacing="-0.5">GeoVerse</text>
  <text x="63" y="46" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="10" fill="#0d9488" letter-spacing="2.5">ECO-TECH EDUCATION</text>
</svg>
